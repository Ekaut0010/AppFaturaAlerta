<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Alerta de Faturas</title>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>Clientes</h1>
            <button class="theme-toggle" onclick="toggleTema()">🌗</button>
        </div>

        <input id="nome" placeholder="Nome">
        <input id="contato" placeholder="Contato">
        <input id="dia" type="number" min="1" max="31" placeholder="Dia do vencimento">

        <button class="btn" onclick="adicionarCliente()">Salvar</button>

        <ul id="listaClientes"></ul>
    </div>
    <script src="script.js"></script>
</body>

</html>
